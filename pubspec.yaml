name: landing_page_emergency
description: >
  Landing page de gestão de emergência convertida de React/Vite para Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Ícones do Material
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/imagens/rescue_logo.png
    - assets/imagens/App.png
    - assets/imagens/apk.png
    - assets/imagens/medical.png
    - assets/imagens/logo_web.png

